name: Update BTC AI status
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # 毎時0分（UTC）

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AI status updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STATUS_FILE_PATH: status.txt
          STATUS_META_PATH: status.json
          OPENAI_MODEL: gpt-4o-mini
          NEWS_QUERY: bitcoin OR btc crypto market
        run: |
          python ai_status_server/update_status.py
